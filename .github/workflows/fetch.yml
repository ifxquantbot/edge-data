name: Fetch daily prices

on:
  schedule:
    # 22:30 UTC weekdays — after US cash close, before Asia open
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "edge-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily price update"
          git push
